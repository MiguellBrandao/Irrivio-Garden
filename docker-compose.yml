services:
  workspace:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "rm -f /tmp/.workspace-ready
      && corepack enable
      && corepack prepare pnpm@10.0.0 --activate
      && pnpm install --force --reporter=append-only
      && touch /tmp/.workspace-ready
      && tail -f /dev/null"
    volumes:
      - ./:/workspace
      - pnpm-store:/pnpm/store
      - workspace-node-modules:/workspace/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
    environment:
      PNPM_HOME: /pnpm
      CI: "true"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/.workspace-ready && test -x /workspace/apps/api/node_modules/.bin/drizzle-kit"]
      interval: 2s
      timeout: 2s
      retries: 60
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: floripa
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d floripa"]
      interval: 5s
      timeout: 5s
      retries: 20
  migration:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "corepack enable
      && corepack prepare pnpm@10.0.0 --activate
      && pnpm --filter api db:migrate
      && pnpm --filter api db:ensure-super-admin"
    volumes:
      - ./:/workspace
      - pnpm-store:/pnpm/store
      - workspace-node-modules:/workspace/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/floripa
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      CI: "true"
    depends_on:
      workspace:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "corepack enable
      && corepack prepare pnpm@10.0.0 --activate
      && pnpm --filter api start:dev"
    volumes:
      - ./:/workspace
      - pnpm-store:/pnpm/store
      - workspace-node-modules:/workspace/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/floripa
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      CI: "true"
    ports:
      - "3001:3000"
    depends_on:
      migration:
        condition: service_completed_successfully

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "corepack enable
      && corepack prepare pnpm@10.0.0 --activate
      && pnpm --filter web exec next dev --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./:/workspace
      - pnpm-store:/pnpm/store
      - workspace-node-modules:/workspace/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      CI: "true"
    ports:
      - "3000:3000"
    depends_on:
      migration:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  postgres-data:
  pnpm-store:
  workspace-node-modules:
  api-node-modules:
  web-node-modules:
